# .github/workflows/ci-piqd.yml
# v0.3 plan §4 row 20 — build the Piqd scheme and run the §5 automated suite on the
# iPhone 17 simulator (iOS 26.4) which matches local dev. The plan originally
# spec'd "iPhone 15 Pro" but that runtime is no longer available on the
# `macos-15`/`macos-26` runners — iPhone 17 is the v0.3 sign-off target.
#
# Jobs:
#   1. unit-niftycore  — NiftyCore SPM test bundle (U1–U14 including Piqd v0.3 format
#                         gate, Sequence/Clip/Dual controllers, CaptureActivityStore)
#   2. unit-niftydata  — NiftyData SPM test bundle (GRDB migrations, adapter config)
#   3. ui              — PiqdUITests (v0.1 UI1–UI6) + PiqdFormatSelectorUITests (v0.3
#                         UI1–UI19 format-selector / shutter-morph / capture-lock)

name: Piqd v0.3 CI

on:
  push:
    branches: [main, Piqd, "claude/**"]
    paths:
      - "Apps/Piqd/**"
      - "NiftyCore/**"
      - "NiftyData/**"
      - ".github/workflows/ci-piqd.yml"
  pull_request:
    paths:
      - "Apps/Piqd/**"
      - "NiftyCore/**"
      - "NiftyData/**"
      - ".github/workflows/ci-piqd.yml"
  workflow_dispatch:

concurrency:
  group: ci-piqd-${{ github.ref }}
  cancel-in-progress: true

env:
  # Don't pin OS — the macos-26 runner's installed iOS runtime drifts (was 26.4
  # at v0.3 sign-off, may be a different point release on any given run). With
  # OS=latest, Xcode picks whichever iOS Simulator runtime is actually present
  # for the iPhone 17 device, which is what we want for CI.
  DESTINATION: "platform=iOS Simulator,name=iPhone 17,OS=latest"

jobs:
  unit-niftycore:
    name: Unit — NiftyCore
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
      - name: List available simulators (diagnostic)
        run: xcrun simctl list devices available | grep -E "iPhone 17|iOS" | head -30
      - name: xcodebuild test (NiftyCore)
        working-directory: NiftyCore
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme NiftyCore \
            -destination "${{ env.DESTINATION }}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

  unit-niftydata:
    name: Unit — NiftyData (incl. PiqdNamespaceTests + perf P1/P3)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
      - name: List available simulators (diagnostic)
        run: xcrun simctl list devices available | grep -E "iPhone 17|iOS" | head -30
      - name: xcodebuild test (NiftyData)
        working-directory: NiftyData
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme NiftyData \
            -destination "${{ env.DESTINATION }}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

  ui:
    name: UI — PiqdUITests (UI1–UI6 + P2)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
      - name: List available simulators (diagnostic)
        run: xcrun simctl list devices available | grep -E "iPhone 17|iOS" | head -30
      - name: Resolve Swift packages
        working-directory: Apps/Piqd
        run: xcodebuild -resolvePackageDependencies -project Piqd.xcodeproj
      - name: xcodebuild test (Piqd + PiqdUITests)
        working-directory: Apps/Piqd
        run: |
          set -o pipefail
          xcodebuild test \
            -project Piqd.xcodeproj \
            -scheme Piqd \
            -destination "${{ env.DESTINATION }}" \
            -only-testing:PiqdUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
